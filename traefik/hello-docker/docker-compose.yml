services:
  hello:
    image: traefik/whoami:v1.10.4
    restart: unless-stopped
    networks:
      - proxy_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_net
      - traefik.http.routers.hello.rule=PathPrefix(`/hello`)
      - traefik.http.routers.hello.entrypoints=web
      - traefik.http.routers.hello.priority=100
      - traefik.http.routers.hello.middlewares=hello-strip
      - traefik.http.middlewares.hello-strip.stripprefix.prefixes=/hello
      - traefik.http.routers.hello-default.rule=PathPrefix(`/`)
      - traefik.http.routers.hello-default.entrypoints=web
      - traefik.http.routers.hello-default.priority=-101
      - traefik.http.routers.hello-default.service=hello
      - traefik.http.services.hello.loadbalancer.server.port=80

networks:
  proxy_net:
    external: true
