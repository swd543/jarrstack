services:
  traefik:
    extends:
      file: ./docker-compose.yml
      service: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik_proxy
      - --entrypoints.web.address=:80
      - --entrypoints.metrics.address=:8082
      - --api.dashboard=true
      - --api.insecure=true
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --tracing=true
      - --tracing.serviceName=traefik
      - --tracing.otlp.grpc=true
      - --tracing.otlp.grpc.endpoint=jaeger:4317
      - --tracing.otlp.grpc.insecure=true

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - traefik_proxy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - traefik_proxy

  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      - TRUST_PROXY=true
    networks:
      - traefik_proxy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.gluetun-webui-slash.rule=Path(`/gluetun-webui`)
      - traefik.http.routers.gluetun-webui-slash.entrypoints=web
      - traefik.http.routers.gluetun-webui-slash.priority=120
      - traefik.http.routers.gluetun-webui-slash.middlewares=gluetun-webui-add-slash
      - traefik.http.middlewares.gluetun-webui-add-slash.redirectregex.regex=^https?://([^/]+)/gluetun-webui$
      - traefik.http.middlewares.gluetun-webui-add-slash.redirectregex.replacement=http://$$1/gluetun-webui/
      - traefik.http.middlewares.gluetun-webui-add-slash.redirectregex.permanent=true
      - traefik.http.routers.gluetun-webui.rule=PathPrefix(`/gluetun-webui/`)
      - traefik.http.routers.gluetun-webui.entrypoints=web
      - traefik.http.routers.gluetun-webui.priority=110
      - traefik.http.routers.gluetun-webui.middlewares=gluetun-webui-strip
      - traefik.http.middlewares.gluetun-webui-strip.stripprefix.prefixes=/gluetun-webui
      - traefik.http.services.gluetun-webui.loadbalancer.server.port=3000

networks:
  traefik_proxy:
    name: traefik_proxy
    driver: bridge
