services:
  curl-check:
    image: curlimages/curl:8.8.0
    container_name: vpn-curl-check
    network_mode: "container:gluetun"
    command: >
      sh -c 'while true; do
        echo "---- $(date -u +%FT%TZ) ----";
        echo "Public IP and location via VPN:";
        curl -fsSL https://ipinfo.io/json;
        echo;
        sleep 30;
      done'
    restart: unless-stopped

  curl-once:
    image: curlimages/curl:8.8.0
    network_mode: "container:gluetun"
    profiles:
      - verify
    command: >
      sh -c 'echo "Public IP via VPN:" &&
      curl -fsSL https://ipinfo.io/json'

networks:
  traefik_proxy:
    external: true
    name: traefik_proxy
