services:
  gluetun:
    extends:
      file: ./docker-compose.yml
      service: gluetun
    environment:
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - FIREWALL_INPUT_PORTS=9091,51413,8000

  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    depends_on:
      - gluetun
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      - GLUETUN_API_KEY=${GLUETUN_API_KEY:-}
      - GLUETUN_USER=${GLUETUN_USER:-}
      - GLUETUN_PASSWORD=${GLUETUN_PASSWORD:-}
    networks:
      - traefik_proxy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.gluetun-webui.rule=PathPrefix(`/gluetun-webui`)
      - traefik.http.routers.gluetun-webui.entrypoints=web
      - traefik.http.routers.gluetun-webui.priority=110
      - traefik.http.routers.gluetun-webui.middlewares=gluetun-webui-strip
      - traefik.http.middlewares.gluetun-webui-strip.stripprefix.prefixes=/gluetun-webui
      - traefik.http.services.gluetun-webui.loadbalancer.server.port=3000

  curl-check:
    image: curlimages/curl:8.8.0
    container_name: vpn-curl-check
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    command: >
      sh -c 'while true; do
        echo "---- $(date -u +%FT%TZ) ----";
        echo "Public IP and location via VPN:";
        curl -fsSL https://ipinfo.io/json;
        echo;
        sleep 30;
      done'
    restart: unless-stopped

  curl-once:
    image: curlimages/curl:8.8.0
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    profiles:
      - verify
    command: >
      sh -c 'echo "Public IP via VPN:" &&
      curl -fsSL https://ipinfo.io/json'

networks:
  traefik_proxy:
    external: true
    name: traefik_proxy
