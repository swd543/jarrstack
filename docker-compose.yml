services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    network_mode: "container:vpn"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ./transmission/config:/config
      - ./transmission/downloads:/downloads
      - ./transmission/watch:/watch
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_net
      - traefik.http.routers.transmission.rule=Host(`bugaboxes.local`) && PathPrefix(`/transmission`)
      - traefik.http.routers.transmission.entrypoints=web
      - traefik.http.routers.transmission.priority=100
      - traefik.http.routers.transmission.service=transmission
      - traefik.http.routers.transmission-default.rule=Host(`bugaboxes.local`)
      - traefik.http.routers.transmission-default.entrypoints=web
      - traefik.http.routers.transmission-default.priority=0
      - traefik.http.routers.transmission-default.service=transmission
      - traefik.http.services.transmission.loadbalancer.server.port=9091