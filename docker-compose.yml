services:
  torrent:
    image: lscr.io/linuxserver/transmission:arm64v8-latest
    container_name: torrent
    network_mode: "container:vpn"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ./torrent/config:/config
      - ./torrent/downloads:/downloads
      - ./torrent/watch:/watch
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_net
      - traefik.http.routers.torrent.rule=Host(`bugaboxes.local`) && PathPrefix(`/torrent`)
      - traefik.http.routers.torrent.entrypoints=web
      - traefik.http.routers.torrent.priority=100
      - traefik.http.routers.torrent.service=torrent
      - traefik.http.routers.torrent-default.rule=Host(`bugaboxes.local`)
      - traefik.http.routers.torrent-default.entrypoints=web
      - traefik.http.routers.torrent-default.priority=0
      - traefik.http.routers.torrent-default.service=torrent
      - traefik.http.services.torrent.loadbalancer.server.port=9091